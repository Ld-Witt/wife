on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - run: |
          # 安装并设置中文语言环境以支持拼音排序
          sudo locale-gen zh_CN.UTF-8
          export LC_COLLATE=zh_CN.UTF-8
          
          # 创建文件夹结构
          mkdir -p _site
          
          # 收集所有文件名并按拼音首字母排序 (A-Z)
          (
            [ -d "img1" ] && find img1 -maxdepth 1 -type f -not -name '.*'
            [ -d "img2" ] && find img2 -maxdepth 1 -type f -not -name '.*'
          ) | sort > _site/list.txt
          
          echo "<html><body><h1>Wife Repository Static API</h1><p>List: <a href='list.txt'>list.txt</a></p><p>Total files: $(wc -l < _site/list.txt)</p></body></html>" > _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'
      - id: deployment
        uses: actions/deploy-pages@v4
